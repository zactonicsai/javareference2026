spring:
  application:
    name: spring-demo

  # Spring Boot 3.x: disable JPA's default behavior of taking over the
  # primary DataSource — we manage two of them manually below.
  datasource:
    h2:
      url: jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password:
      driver-class-name: org.h2.Driver
      hikari:
        maximum-pool-size: 5
    postgres:
      url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/demodb}
      username: ${POSTGRES_USER:demo}
      password: ${POSTGRES_PASSWORD:demo}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 10
        connection-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true

  # Temporal Spring Boot starter
  # The connection target is "local" by default which connects to localhost:7233.
  # Override TEMPORAL_TARGET to point at the broker host (e.g. temporal:7233 inside docker-compose).
  temporal:
    connection:
      target: ${TEMPORAL_TARGET:local}
    namespace: ${TEMPORAL_NAMESPACE:default}
    # Worker is OFF by default. The 'worker' profile (worker container) turns it on.
    workers-auto-discovery:
      packages: []

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# App-specific
app:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:4566}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:test}
    secret-key: ${S3_SECRET_KEY:test}
    bucket: ${S3_BUCKET:demo-uploads}
    path-style: true
  upload:
    max-bytes: 10485760

# Actuator: public health/info, admin for the rest
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, env, beans, mappings, loggers
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true

info:
  app:
    name: spring-demo
    description: Spring Boot 3.5.13 demo with security, dual-store CRUD, Temporal and S3
    version: 1.0.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.example.demo: DEBUG
    io.temporal: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{traceId:-}] [%X{user:-}] %logger{36} - %msg%n"

---
# Worker profile: no HTTP, register Temporal workflow + activity beans
spring:
  config:
    activate:
      on-profile: worker
  main:
    web-application-type: none
  temporal:
    workers-auto-discovery:
      packages:
        - com.example.demo.temporal.workflow
        - com.example.demo.temporal.activity
    workers:
      - task-queue: product-task-queue
        name: product-worker

# Disable web/security autoconfig pieces that aren't useful in a worker-only deployment
management:
  endpoints:
    web:
      exposure:
        include: health, info
